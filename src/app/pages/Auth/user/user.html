<div class="auth-page-wrapper">
  <div class="auth-content">
    <div class="logo-container">
      <img
        src="assets/spotify-logo_green.png"
        alt="Spotify"
        class="spotify-logo"
      />
    </div>

    <div class="actions-container">
      <button
        class="btn-primary"
        (click)="onLogin()"
      >
        LOG IN
      </button>

      <button
        class="btn-secondary"
        (click)="onSignUp()"
      >
        SIGN UP FOR SPOTIFY
      </button>
    </div>
  </div>
</div>
