<div class="spotify__home-container__playlist-container">
    @if (hasError) {
    <div class="fatal-error">Ошибка загрузки: {{ errorMessage }}</div>
    }

    @if (albums.length > 0) {

    <div class="playlist_card_collections">
        <h4>Focus</h4>

        <app-slider [items]="albums" name="focus_section">
        </app-slider>
    </div>

    <div class="playlist_card_collections">
        <h4>Spotify Playlist</h4>

        <app-slider [items]="albums" name="spotify_section">
        </app-slider>
    </div>

    } @else {
    <div class="loading-placeholder">Загрузка…</div>
    }
</div>
