<div class="spotify__home-container">
    <div class="spotify__home-container_side-bar col-2">
        <div class="spotify__home-container_side-bar-item">
            <img width="150" class="m-3 text-left" src="assets/spotify-logo_light.png" alt="spotify light logo" />
        </div>
        <div class="spotify__home-container_side-bar-item">
            <a href="">Home</a>
        </div>
        <div class="spotify__home-container_side-bar-item">
            <a href="">Search</a>
        </div>
        <div class="spotify__home-container_side-bar-item">
            <a href="">Your Library</a>
        </div>
        <div class="spotify__home-container_side-bar-item">
            <a href="">Create Playlist</a>
        </div>
    </div>
    <div class="spotify__home-container__playlist-container col-10">
        <app-top-nav></app-top-nav>
        <div [style.marginTop]="'48px'" class="mt-5 container-fluid">
            <h4 [style.color]="'white'" [style.padding]="'10px'">Focus</h4>
            <div class="playlist_card_collections" (wheel)="scrollHorizontally($event)">
                <div id="song_card_item" *ngFor="let SongC of SongCards">
                    <app-song-card [playlistThumbnail]="SongC.thumbnail" [title]="SongC.title"
                        [description]="SongC.description"></app-song-card>
                </div>
            </div>
        </div>
        <div [style.marginTop]="'250px'" class="mt-5 container-fluid">
            <h4 [style.color]="'white'" [style.padding]="'10px'">Spotify Playlist</h4>
            <div class="playlist_card_collections" (wheel)="scrollHorizontally($event)">
                <div id="song_card_item" *ngFor="let SongC of SongCards">
                    <app-song-card [playlistThumbnail]="SongC.thumbnail" [title]="SongC.title"
                        [description]="SongC.description"></app-song-card>
                </div>
            </div>
        </div>
    </div>
</div>
