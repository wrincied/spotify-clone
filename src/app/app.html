@if (isNoLayout) {
  <router-outlet />
} @else {
  <div class="spotify-app">
    <app-spotify-sidebar />

    <div class="spotify-main">
      <app-top-nav />

      <div
        class="spotify-content-scroll"
        [class.has-player]="playerService.isVisible()"
      >
        <router-outlet />
      </div>
    </div>

    @if (playerService.isVisible()) {
      <div class="spotify-app__player">
        <app-player></app-player>
      </div>
    }
  </div>
}
