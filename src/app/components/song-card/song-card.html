<div class="spotify__song-card">

    <div class="spotify__song-card_thumbnail">
        <img 
            [src]="playlistThumbnail || 'assets/no-image.jpg'"
            (error)="onImageError($event)"
        />
    </div>

    <div class="spotify__song-card_text">
        <p class="title">{{ title }}</p>
        <p class="description">{{ description }}</p>
    </div>

</div>
