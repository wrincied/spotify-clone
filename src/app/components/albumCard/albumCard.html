<div class="spotify__albumCard" [class.top-result-mode]="isTopResult" (click)="onClick()">
  <div class="spotify__albumCard_thumbnail">
    <img [src]="playlistThumbnail || 'assets/no-image.jpg'" (error)="onImageError($event)" />
  </div>

  <div class="spotify__albumCard_text">
    <p class="title">{{ title }}</p>

    <div class="meta-row">
      @if(isTopResult){
      <span class="type-badge">Album</span>
      <p class="description">{{ description }}</p>
      }
    </div>
  </div>

  @if (isTopResult) {
  <div class="play-button-overlay">
    <button>▶</button>
  </div>
  }
</div>
