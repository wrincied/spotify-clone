<div
  class="spotify__albumCard"
  [class.top-result-mode]="isTopResult"
  [class.fixed-width]="fixedSize"
>
  <a [routerLink]="link">
    <div
      class="spotify__albumCard_thumbnail"
      [style.background-color]="backgroundColor"
    >
      @if (playlistThumbnail) {
        <img
          [src]="playlistThumbnail"
          (error)="onImageError($event)"
          loading="lazy"
          alt="Cover"
        />
      }
      @if (!playlistThumbnail && backgroundColor) {
        <div
          class="category-title-overlay"
          appFitText
          [minFontSize]="16"
          [maxFontSize]="16"
        >
          {{ title }}
        </div>
      }
    </div>

    <div class="spotify__albumCard_text">
      <p
        class="title"
        appFitText
        [minFontSize]="16"
        [maxFontSize]="32"
      >
        {{ title }}
      </p>

      @if (description) {
        <p class="description">{{ description }}</p>
      }
    </div>

    @if (isTopResult) {
      <div class="play-button-overlay">
        <button
          class="play-btn"
          (click)="handlePlay($event)"
        >
          @if (isPlaying) {
            <img
              width="25px"
              src="assets/pause-50.svg"
              alt="plat-btn"
            />
          } @else {
            <img
              width="25px"
              src="assets/spielen-50.svg"
              alt="Play"
              class="svg-icon"
            />
          }
        </button>
      </div>
    }
  </a>
</div>
