<div
  class="songRow__container"
  [class.active]="isCurrent"
  [attr.context]="context"
  (click)="handlePlay($event)"
>
  <div class="row__info">
    <div class="index-col">
      @if (isThumbnailMode && thumbnailUrl) {
        <div class="thumbnail-wrapper">
          <img
            [src]="thumbnailUrl"
            class="row-thumbnail"
            alt="cover"
          />
          <button
            class="play-icon overlay-icon"
            (click)="handlePlay($event)"
          >
            @if (isCurrent && isPlaying) {
              <img
                width="15px"
                src="assets/pause-50.svg"
                alt="Pause"
                class="svg-icon"
              />
            } @else {
              <img
                width="15px"
                src="assets/spielen-50.svg"
                alt="Play"
                class="svg-icon"
              />
            }
          </button>
        </div>
      } @else {
        <span class="index-number">
          @if (isCurrent) {
            @if (isPlaying) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
              >
                <rect
                  x="1"
                  y="15"
                  width="4"
                  height="9"
                  fill="currentColor"
                >
                  <animate
                    attributeName="y"
                    values="15;5;15"
                    dur="1s"
                    repeatCount="indefinite"
                  />
                  <animate
                    attributeName="height"
                    values="9;19;9"
                    dur="1s"
                    repeatCount="indefinite"
                  />
                </rect>
                <rect
                  x="7"
                  y="5"
                  width="4"
                  height="19"
                  fill="currentColor"
                >
                  <animate
                    attributeName="y"
                    values="5;15;5"
                    dur="1.2s"
                    repeatCount="indefinite"
                    begin="0.2s"
                  />
                  <animate
                    attributeName="height"
                    values="19;9;19"
                    dur="1.2s"
                    repeatCount="indefinite"
                    begin="0.2s"
                  />
                </rect>
                <rect
                  x="13"
                  y="10"
                  width="4"
                  height="14"
                  fill="currentColor"
                >
                  <animate
                    attributeName="y"
                    values="10;0;10"
                    dur="0.8s"
                    repeatCount="indefinite"
                    begin="0.4s"
                  />
                  <animate
                    attributeName="height"
                    values="14;24;14"
                    dur="0.8s"
                    repeatCount="indefinite"
                    begin="0.4s"
                  />
                </rect>
                <rect
                  x="19"
                  y="12"
                  width="4"
                  height="12"
                  fill="currentColor"
                >
                  <animate
                    attributeName="y"
                    values="12;7;12"
                    dur="1.1s"
                    repeatCount="indefinite"
                    begin="0.1s"
                  />
                  <animate
                    attributeName="height"
                    values="12;17;12"
                    dur="1.1s"
                    repeatCount="indefinite"
                    begin="0.1s"
                  />
                </rect>
              </svg>
            } @else {
              <img
                width="20px"
                src="assets/pause-50.svg"
                alt="Paused"
                class="index-icon"
              />
            }
          } @else {
            {{ index }}
          }
        </span>

        <button
          class="play-icon hover-icon"
          (click)="handlePlay($event)"
        >
          @if (isCurrent && isPlaying) {
            <img
              width="20px"
              src="assets/pause-50.svg"
              alt="Pause"
              class="svg-icon"
            />
          } @else {
            <img
              width="20px"
              src="assets/spielen-50.svg"
              alt="Play"
              class="svg-icon"
            />
          }
        </button>
      }
    </div>

    <div class="row__text">
      <div
        class="title"
        [class.active-title]="isCurrent"
      >
        <span>{{ song.title }}</span>
      </div>
      <div class="artist">
        @if (song.artistId) {
          <a
            class="artist-link"
            (click)="onCardClick(song.artistId)"
          >
            <span>{{ song.artist }}</span>
          </a>
        } @else {
          <span>{{ song.artist }}</span>
        }
      </div>
    </div>
  </div>

  <div class="row__duration">
    <span>{{ song.duration | formatTime }}</span>
  </div>
</div>
