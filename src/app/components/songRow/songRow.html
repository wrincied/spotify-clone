<div class="songRow__container">
  <div class="row__info">
    <div class="index">
      <span>
        {{ index }}
      </span>
    </div>
    <div class="row__text">
      <div class="title">
        <span>{{ song.title }}</span>
      </div>
      <div class="artist">
        <span>{{ song.artist }}</span>
      </div>
    </div>
  </div>
  <div class="row__duration">
    <span>{{ song.duration | formatTime }}</span>
  </div>
</div>
