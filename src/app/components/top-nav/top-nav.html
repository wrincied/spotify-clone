<header class="spotify-top-nav">
  <div class="spotify-top-nav__history" [class.mobile-visible]="showMobileHistory()">
    <button
      (click)="goBack()"
      class="btn-history__left"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 50 50"
        width="50"
        height="50"
      >
        <path
          fill="currentColor"
          d="M20.79 13.24c1.1.38 1.1.38 2.21.76-1.57 3.66-2.94 4.94-6 8 8.25.33 16.5.66 25 1 0 1.32 0 2.64 0 4-12.38.5-12.38.5-25 1 1.65 1.65 3.3 3.3 5 5 0 1.32 0 2.64 0 4-4.93-.42-6.98-2.55-10.32-6.06-.88-.92-1.76-1.84-2.67-2.79-.66-.71-1.33-1.42-2.01-2.15 1.53-3.56 3.64-6.03 6.31-8.81.76-.81 1.52-1.62 2.3-2.46 2.39-1.73 2.39-1.73 5.18-3.22z"
        />
      </svg>
    </button>
    <button
      (click)="goForward()"
      class="btn-history__right"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 50 50"
        width="50"
        height="50"
      >
        <path
          fill="currentColor"
          d="M20.79 13.24c1.1.38 1.1.38 2.21.76-1.57 3.66-2.94 4.94-6 8 8.25.33 16.5.66 25 1 0 1.32 0 2.64 0 4-12.38.5-12.38.5-25 1 1.65 1.65 3.3 3.3 5 5 0 1.32 0 2.64 0 4-4.93-.42-6.98-2.55-10.32-6.06-.88-.92-1.76-1.84-2.67-2.79-.66-.71-1.33-1.42-2.01-2.15 1.53-3.56 3.64-6.03 6.31-8.81.76-.81 1.52-1.62 2.3-2.46 2.39-1.73 2.39-1.73 5.18-3.22z"
        />
      </svg>
    </button>
  </div>

  <div class="spotify-top-nav__search">
    <div class="spotify-top-nav__search-icon">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        width="24"
        height="24"
        fill="--background-fallback-dark"
      >
        <path
          d="M10.533 1.27893C5.35215 1.27893 1.12598 5.41887 1.12598 10.5579C1.12598 15.697 5.35215 19.8369 10.533 19.8369C12.767 19.8369 14.8235 19.0671 16.4402 17.7794L20.7929 22.132C21.1834 22.5226 21.8166 22.5226 22.2071 22.132C22.5976 21.7415 22.5976 21.1083 22.2071 20.7178L17.8634 16.3741C19.1616 14.7849 19.94 12.7634 19.94 10.5579C19.94 5.41887 15.7138 1.27893 10.533 1.27893ZM3.12598 10.5579C3.12598 6.55226 6.42768 3.27893 10.533 3.27893C14.6383 3.27893 17.94 6.55226 17.94 10.5579C17.94 14.5636 14.6383 17.8369 10.533 17.8369C6.42768 17.8369 3.12598 14.5636 3.12598 10.5579Z"
        ></path>
      </svg>
    </div>
    <input
      class="spotify-top-nav__search-input"
      type="search"
      placeholder="What do you want to listen to?"
      [ngModel]="query"
      (ngModelChange)="onInput($event)"
    />
    @if (query) {
      <div class="spotify-top-nav__search-clear">✕</div>
    }
  </div>

  <div class="spotify-top-nav__auth">
    <div class="spotify-top-nav__auth-desktop">
      <div
        class="spotify-top-nav__auth-signup"
        (click)="onNavigateToSignUp()"
      >
        Sign Up
      </div>
      <button
        class="spotify-top-nav__auth-btn"
        (click)="onNagivateToLogin()"
      >
        Log In
      </button>
    </div>

    <div
      class="spotify-top-nav__auth-mobile"
      (click)="onNagivateToMobileAuth()"
    >
      <div class="user-avatar-circle">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="currentColor"
        >
          <path
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
          />
        </svg>
      </div>
    </div>
  </div>
</header>
