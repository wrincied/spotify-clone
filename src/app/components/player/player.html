@if (currentTrack$ | async; as track) {
  <div class="player-container">
    <div class="track-info">
      <img
        [src]="(currentCover$ | async) || 'assets/no-album.png'"
        class="cover-image"
        alt="Cover"
      />
      <div class="meta">
        <div class="track-title">
        @if (track.albumId) {
          <a
            class="nav-link"
            (click)="navToAlbum(track.albumId)"
            title="Go to Album"
          >
            {{ track.title }}
          </a>
        } @else {
          <span>{{ track.title }}</span>
        }
        </div>
        <div class="artist-name">
          @if (track.artistId) {
            <a
              class="artist-link"
              (click)="navToArtist(track.artistId)"
              title="Go to Artist"
            >
              {{ track.artist }}
            </a>
          } @else {
            <span>{{ track.artist }}</span>
          }
        </div>
      </div>
    </div>

    <div class="player-controls">
      <div class="buttons">
        <button
          class="control-btn shuffle-btn mobile-hidden"
          [class.active]="isSchuffling$ | async"
          (click)="playerService.toggleShuffle()"
          title="Enable Shuffle"
        >
          <svg
            viewBox="0 0 16 16"
            width="16"
            height="16"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M13.151.922a.75.75 0 1 0-1.06 1.06L13.109 3H11.16a3.75 3.75 0 0 0-2.873 1.34l-6.173 7.356A2.25 2.25 0 0 1 .39 12.5H0V14h.391a3.75 3.75 0 0 0 2.873-1.34l6.173-7.356a2.25 2.25 0 0 1 1.724-.804h1.947l-1.017 1.018a.75.75 0 0 0 1.06 1.06L15.98 3.75zM.391 3.5H0V2h.391c1.109 0 2.16.49 2.873 1.34L4.89 5.277l-.979 1.167-1.796-2.14A2.25 2.25 0 0 0 .39 3.5z"
            ></path>
            <path
              d="m7.5 10.723.98-1.167.957 1.14a2.25 2.25 0 0 0 1.724.804h1.947l-1.017-1.018a.75.75 0 1 1 1.06-1.06l2.829 2.828-2.829 2.828a.75.75 0 1 1-1.06-1.06L13.109 13H11.16a3.75 3.75 0 0 1-2.873-1.34l-.787-.938z"
            ></path>
          </svg>
        </button>

        <button
          class="control-btn mobile-hidden"
          (click)="prevTrack()"
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="currentColor"
          >
            <path d="M19 5v14l-8-7 8-7zM6 6h2v12H6V6z" />
          </svg>
        </button>

        <button
          class="control-btn play-btn"
          (click)="togglePlay()"
        >
          @if (isBuffering$ | async) {
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              class="spinner"
            >
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="3"
                fill="none"
                stroke-dasharray="30 60"
              >
                <animateTransform
                  attributeName="transform"
                  type="rotate"
                  from="0 12 12"
                  to="360 12 12"
                  dur="1s"
                  repeatCount="indefinite"
                />
              </circle>
            </svg>
          } @else {
            @if (isPlaying$ | async) {
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="currentColor"
              >
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            } @else {
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="currentColor"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            }
          }
        </button>

        <button
          class="control-btn"
          (click)="nextTrack()"
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="currentColor"
          >
            <path d="M5 5v14l8-7-8-7zM16 6h2v12h-2V6z" />
          </svg>
        </button>

        <button
          class="control-btn loop-btn mobile-hidden"
          [class.active]="isLooping$ | async"
          (click)="toggleLoop()"
          title="Enable Repeat"
        >
          <svg
            viewBox="0 0 16 16"
            width="16"
            height="16"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M0 4.75A3.75 3.75 0 0 1 3.75 1h8.5A3.75 3.75 0 0 1 16 4.75v5a3.75 3.75 0 0 1-3.75 3.75H9.81l1.018 1.018a.75.75 0 1 1-1.06 1.06L6.939 12.75l2.829-2.828a.75.75 0 1 1 1.06 1.06L9.811 12h2.439a2.25 2.25 0 0 0 2.25-2.25v-5a2.25 2.25 0 0 0-2.25-2.25h-8.5A2.25 2.25 0 0 0 1.5 4.75v5A2.25 2.25 0 0 0 3.75 12H5v1.5H3.75A3.75 3.75 0 0 1 0 9.75z"
            ></path>
          </svg>
        </button>
      </div>

      <div class="progress-bar-container mobile-hidden">
        <span class="time current">{{ formatTime(currentTime$ | async) }}</span>
        <input
          type="range"
          min="0"
          [max]="(duration$ | async) || 0"
          [value]="(currentTime$ | async) || 0"
          (input)="onSeek($event)"
          class="seek-slider"
        />
        <span class="time total">{{ formatTime(duration$ | async) }}</span>
      </div>
    </div>

    <div class="volume-controls mobile-hidden">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="currentColor"
      >
        <path d="M3 9v6h4l5 5V4L7 9H3z" />
      </svg>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        (input)="onVolumeChange($event)"
        class="volume-slider"
      />
    </div>
  </div>
}
