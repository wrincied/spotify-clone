@if (currentTrack$ | async; as track) {
  <div class="player-container">
    <div class="track-info">
      <img
        [src]="(currentCover$ | async) || 'assets/no-album.png'"
        alt="Cover"
        class="cover-image"
      />
      <div class="meta">
        <div class="track-title">{{ track.title }}</div>
        <div class="artist-name">{{ track.artist }}</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="buttons">
        <button
          class="control-btn loop-btn mobile-hidden"
          [class.active]="isLooping$ | async"
          (click)="toggleLoop()"
          title="Enable Repeat"
        >
          <svg
            viewBox="0 0 16 16"
            fill="currentColor"
            width="16"
            height="16"
          >
            <path
              d="M0 4.75A3.75 3.75 0 0 1 3.75 1h8.5A3.75 3.75 0 0 1 16 4.75v5a3.75 3.75 0 0 1-3.75 3.75h-8.5a.75.75 0 0 1 0-1.5h8.5a2.25 2.25 0 0 0 2.25-2.25v-5a2.25 2.25 0 0 0-2.25-2.25h-8.5a2.25 2.25 0 0 0-2.25 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5z"
            />
            <path
              d="M5 8.25a.75.75 0 0 1 .166.485L5 8.75v2.96l2.316-2.06a.75.75 0 1 1 .998 1.12l-3.56 3.166a.75.75 0 0 1-1.042-.046l-3.17-3.167a.75.75 0 1 1 1.058-1.06l2.4 2.4V8.75a.75.75 0 0 1 .75-.75h.25z"
            />
          </svg>
        </button>

        <button
          class="control-btn mobile-hidden"
          (click)="prevTrack()"
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="currentColor"
          >
            <path d="M19 5v14l-8-7 8-7zM6 6h2v12H6V6z" />
          </svg>
        </button>

        <button
          class="control-btn play-btn"
          (click)="togglePlay()"
        >
          @if (isBuffering$ | async) {
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              class="spinner"
            >
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="3"
                fill="none"
                stroke-dasharray="30 60"
              >
                <animateTransform
                  attributeName="transform"
                  type="rotate"
                  from="0 12 12"
                  to="360 12 12"
                  dur="1s"
                  repeatCount="indefinite"
                />
              </circle>
            </svg>
          } @else {
            @if (isPlaying$ | async) {
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="currentColor"
              >
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            } @else {
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="currentColor"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            }
          }
        </button>

        <button
          class="control-btn"
          (click)="nextTrack()"
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="currentColor"
          >
            <path d="M5 5v14l8-7-8-7zM16 6h2v12h-2V6z" />
          </svg>
        </button>
      </div>

      <div class="progress-bar-container mobile-hidden">
        <span class="time current">{{ formatTime(currentTime$ | async) }}</span>
        <input
          type="range"
          min="0"
          [max]="(duration$ | async) || 0"
          [value]="(currentTime$ | async) || 0"
          (input)="onSeek($event)"
          class="seek-slider"
        />
        <span class="time total">{{ formatTime(duration$ | async) }}</span>
      </div>
    </div>

    <div class="volume-controls mobile-hidden">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="currentColor"
      >
        <path d="M3 9v6h4l5 5V4L7 9H3z" />
      </svg>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        (input)="onVolumeChange($event)"
        class="volume-slider"
      />
    </div>
  </div>
}
