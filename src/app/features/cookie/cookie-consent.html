@if (isVisible()) {
  <div
    class="cookie-banner"
  >
    <div class="content">
      <p>
        We use cookies and your IP address to ensure security and improve the
        service. By continuing, you agree to this.
      </p>
    </div>
    <div class="actions">
      <button (click)="accept()">Accept</button>
    </div>
  </div>
}
