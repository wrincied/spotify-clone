<div
  class="slider-container"
  (mousemove)="onMouseMove($event)"
  (mouseleave)="hideButtons()"
>
  @if (showLeftBtn) {
    <button
      class="scroll-btn left"
      (click)="scrollLeft(slider)"
    >
      ‹
    </button>
  }

  <div
    #slider
    class="playlist_card_collections"
    (scroll)="hideButtons()"
  >
    @if (album.length > 0) {
      @for (item of album; track item.id) {
        <div class="album-card-wrapper">
          <app-albumCard
            [id]="item.id"
            [type]="'album'"
            [title]="item.title"
            [description]="item.description"
            [playlistThumbnail]="
              item.cover || item.thumbnail || 'https://placehold.co/600x400/png'
            "
            [releaseYear]="item.releaseYear"
            [artistId]="item.artistId"
            [fixedSize]="true"
          ></app-albumCard>
        </div>
      }
    } @else if (category.length > 0) {
      @for (item of category; track item.id) {
        <div class="album-card-wrapper">
          <app-albumCard
            [id]="item.id"
            [type]="'category'"
            [title]="item.name"
            [description]="item.description"
            [backgroundColor]="item.color"
            [fixedSize]="true"
          >
          </app-albumCard>
        </div>
      }
    }
  </div>

  @if (showRightBtn) {
    <button
      class="scroll-btn right"
      (click)="scrollRight(slider)"
    >
      ›
    </button>
  }
</div>
